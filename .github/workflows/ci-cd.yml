name: Mini Data Platform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install boto3 psycopg2-binary

    - name: Build Docker Airflow Image
      run: docker build -t mini_data_platform-airflow:latest .

    - name: Lint Python scripts
      run: |
        # Simple syntax check for all python files
        python -m py_compile scripts/*.py airflow/dags/*.py

    - name: Start Services (Dry Run / Config Check)
      run: |
        touch .env
        docker compose config
